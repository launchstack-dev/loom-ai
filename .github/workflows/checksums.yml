# Verify that checksums.sha256 stays in sync with the files it tracks.
#
# install.sh validates downloaded files against checksums.sha256 on cold
# install. If a contributor edits a tracked file (anything listed in the
# manifest) without running scripts/generate-checksums.sh, install.sh
# starts rejecting the download — and every cold install on main breaks
# silently until someone notices.
#
# This workflow catches that regression in CI. Pairs with the local-side
# pre-commit hook (scripts/git-hooks/pre-commit) which regenerates the
# manifest automatically on commit; CI is the safety net for contributors
# who haven't run `scripts/install-hooks.sh` yet.
#
# Failure remediation is one command: `scripts/generate-checksums.sh`,
# committed and pushed.

name: checksums

on:
  pull_request:
    paths:
      - 'checksums.sha256'
      - 'install.sh'
      - 'hooks/**'
      - 'commands/**'
      - 'config/**'
      - 'scripts/**'
      - 'skills/**'
      - '.github/workflows/checksums.yml'
  push:
    branches: [main]
    paths:
      - 'checksums.sha256'
      - 'install.sh'
      - 'hooks/**'
      - 'commands/**'
      - 'config/**'
      - 'scripts/**'
      - 'skills/**'
      - '.github/workflows/checksums.yml'

permissions:
  contents: read

jobs:
  verify:
    name: verify checksums.sha256
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify checksum hashes are accurate
        run: bash scripts/verify-checksums.sh

      - name: Verify install.sh and manifest are in sync
        run: bash scripts/check-install-manifest-drift.sh

      - name: End-to-end install sandbox (local mode)
        run: bash scripts/test-install-sandbox.sh --local

      # Plugin install path surfacing — non-blocking until the manifest is fixed.
      # As of this commit the test fails because .claude-plugin/plugin.json has a
      # schema mismatch ("agents: Invalid input") and many commands lack required
      # frontmatter. Removing continue-on-error is the acceptance signal for the
      # follow-up "fix plugin manifest for marketplace distribution" PR.
      - name: End-to-end plugin install sandbox (surfacing only)
        run: bash scripts/test-plugin-install-sandbox.sh
        continue-on-error: true

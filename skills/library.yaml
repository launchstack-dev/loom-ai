catalog_version: 4
repo: https://github.com/launchstack-dev/loom-ai
loomCoreVersion: 0.1.0
loomHooksVersion: 0.1.0

releases:
  - version: 0.1.0
    coreTarball: https://github.com/launchstack-dev/loom-ai/releases/download/v0.1.0/loom-core-v0.1.0.tar.gz
    hooksTarball: https://github.com/launchstack-dev/loom-ai/releases/download/v0.1.0/loom-hooks-v0.1.0.tar.gz
    cosignSignature: https://github.com/launchstack-dev/loom-ai/releases/download/v0.1.0/loom-core-v0.1.0.tar.gz.sig
    sha256Manifest: https://github.com/launchstack-dev/loom-ai/releases/download/v0.1.0/SHA256SUMS
    releasedAt: 2026-06-01T00:00:00Z

default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  # In v4, protocols = formerly library.skills from v3 (inter-agent message schema files)
  protocols:
    - name: execution-protocols
      description: Inter-agent protocol schemas for the Loom execution pipeline (AgentResult, state.toon, execution conventions)
      source: protocols/execution-conventions.md

    - name: toon-format-protocol
      description: TOON (Token-Oriented Object Notation) format specification for all on-disk artifacts and agent communication
      source: protocols/toon-format.md

    - name: pattern-executor-protocol
      description: Reusable pattern runtime protocol for debate, chain, vote, triage orchestration patterns
      source: protocols/pattern-executor.md

    - name: roadmap-schema
      description: Schema for ROADMAP.md structure - vision, features, milestones, constraints, conceptual data model
      source: protocols/roadmap.schema.md

    - name: spec-schema
      description: Schema for v2 spec-level plan sections - API specs, state machines, error handling, validation rules
      source: protocols/spec.schema.md

    - name: plan-schema
      description: Schema for PLAN.md structure - phases, waves, deliverables, acceptance criteria, file ownership
      source: protocols/plan.schema.md

    - name: agent-result-schema
      description: Standard AgentResult return envelope schema - status, files, exports, issues, integration notes
      source: protocols/agent-result.schema.md

    - name: state-schema
      description: Execution state schema for state.toon - waves, tasks, agents, file hashes, rolling context
      source: protocols/state.schema.md

    - name: pipeline-state-schema
      description: Pipeline state schema for /loom-auto - outer iterations, stage history, failure log, circuit breakers
      source: protocols/pipeline-state.schema.md

    - name: agent-monitoring-schema
      description: Agent progress monitoring schema - heartbeat files, stale detection, escalation thresholds
      source: protocols/agent-monitoring.schema.md

    - name: validation-rules
      description: Validation rules for AgentResult, orchestration.toml, blocker gates, state integrity, plan structure
      source: protocols/validation-rules.md

    - name: orchestration-patterns
      description: Orchestration pattern catalog - debate, chain, vote, triage, converge with config schemas and examples
      source: protocols/orchestration-patterns.md

    - name: orchestration-config-schema
      description: Schema for .claude/orchestration.toml - project-specific agent registration, pattern config, settings
      source: protocols/orchestration-config.schema.md

    - name: statusline-contract
      description: Output format contract for the Claude Code status line — defines ambient state shape, renderer protocol, and Starship integration
      source: protocols/statusline-contract.md

    - name: git-command-contract
      description: Subcommand dispatch contract for loom-git — defines commit, push, PR, merge, cleanup, review-pr protocols
      source: protocols/git-command-contract.md

    - name: quick-task-contract
      description: Contract for loom-quick — mode detection, plan-aware append, mid-execution injection, verification protocol
      source: protocols/quick-task-contract.md

    - name: loom-quick-routing
      description: "Natural-language routing skill for /loom-quick — triggers on \"quickly fix\", \"just do\", \"quick task\" patterns"
      source: skills/loom-quick-routing.md

    - name: fix-archive-schema
      description: Schema for fix archive entries — TOON format for bug fix summaries with impact assessment
      source: protocols/fix-archive.schema.md

    - name: loom-bugfix-routing
      description: "Natural-language routing skill for /loom bugfix — triggers on bug reports, error descriptions, broken behavior"
      source: skills/loom-bugfix-routing.md

    # Wiki protocols
    - name: wiki-page-schema
      description: Schema for individual wiki pages — TOON frontmatter format, categories, cross-references, staleness model
      source: protocols/wiki-page.schema.md

    - name: wiki-index-schema
      description: Schema for wiki index.toon — categorical catalog of all wiki pages
      source: protocols/wiki-index.schema.md

    - name: wiki-log-schema
      description: Schema for wiki log.toon — append-only chronological record of wiki operations
      source: protocols/wiki-log.schema.md

    - name: execution-log-schema
      description: Schema for execution-log.toon — narrative decision, pivot, and milestone history
      source: protocols/execution-log.schema.md

    - name: wiki-conventions
      description: Conventions for wiki agents — directory structure, page format, cross-ref rules, staleness model, atomic writes
      source: protocols/wiki-conventions.md

    - name: wiki-lint-rules
      description: Structural health check rules for wiki and execution artifacts — contradictions, orphans, drift, staleness
      source: protocols/wiki-lint-rules.md

    - name: behavioral-guidelines
      description: Karpathy-inspired behavioral guardrails for agents — assumption surfacing, simplicity, surgical changes, goal-driven verification
      source: protocols/behavioral-guidelines.md

    - name: scope-contract-schema
      description: Schema for scope-contract.toon — pre-flight decisions, assumptions, acceptance criteria, non-goals, contract evolution rules
      source: protocols/scope-contract.schema.md

    - name: convergence-plan-schema
      description: Schema for convergence-plan.toon — targets, methods, tolerances, capture config, budget, planning decisions
      source: protocols/convergence-plan.schema.md

    # Spec-upgrades protocols (PLAN-spec-upgrades.md)
    - name: scenario-schema
      description: Schema for Given/When/Then scenario blocks usable in roadmap features, plan phases, change proposals, and contract-* wiki pages
      source: protocols/scenario.schema.md

    - name: contract-page-extensions-schema
      description: Schema for category=contract wiki pages — extended frontmatter (contractVersion, domain, contentChecksum) and required body sections
      source: protocols/contract-page-extensions.schema.md

    - name: change-proposal-schema
      description: Schema for change proposals at .loom/changes/{changeId}/ — ChangeProposal, DeltaBlock, atomic archive semantics
      source: protocols/change-proposal.schema.md

    - name: change-state-schema
      description: Schema for runtime ChangeState at .plan-execution/ephemeral/changes/{changeId}.toon — status, transitions, conflicts, supersession
      source: protocols/change-state.schema.md

    - name: scenario-coverage-schema
      description: Schema for scenario-coverage.toon — traceability mapping every R-NN requirement to its covering scenarios with status (covered/uncovered/partial)
      source: protocols/scenario-coverage.schema.md

    - name: entity-domain-partition-schema
      description: Schema for contract-partition.toon — explicit partitioning manifest mapping entities to contract-{domain} pages (used by /loom-plan materialize)
      source: protocols/entity-domain-partition.schema.md

    # Convergence-generalization schemas (Phase 0 of convergence-generalization plan; consumed by document-mode loops)
    - name: findings-schema
      description: Schema for findings.toon — uniform ConvergenceFindings contract emitted by harnesses (target/criteria/document modes); locked severity-to-convergence-severity mapping (critical|high → blocking, medium → warning, low|info|advisory → info); preserves W-03 reviewerAgent attribution per row
      source: protocols/findings.schema.md

    - name: plan-critique-schema
      description: Schema for critique.toon — PlanCritique envelope written by plan-critic-agent (Step 1.7); mirrors findings.schema.md shape so plan-builder-agent's Integrator Mode can consume critic output through the same integrator contract
      source: protocols/plan-critique.schema.md

    - name: iteration-snapshot-schema
      description: Schema for IterationSnapshot metadata files at planning/history/snapshots/{slug}-pass-{N}.toon — pairs with the per-iteration subject-file copy; sha256-verified atomic-write contract used by document-mode auto-snapshots (C-07)
      source: protocols/iteration-snapshot.schema.md

    - name: convergence-summary-schema
      description: Schema for convergence-summary.toon — 11-field terminal-state envelope for any /loom-converge run (target/criteria/document); link-extraction readiness contract per C-11; halt-reason enum cross-referenced from convergence-driver.md circuit breakers
      source: protocols/convergence-summary.schema.md

    # Roadmap-converge protocols (Phase 0a/0b of PLAN-roadmap-converge-harness)
    - name: roadmap-readiness
      description: Schema for RoadmapReadinessSchema — MVP default 8 dimensions with rubricRef paths, archetype variants, DimensionDef columns, and dependsOn ordering for the roadmap-converge driver
      source: protocols/roadmap-readiness.schema.toon

    - name: roadmap-converge-state
      description: Schema for RoadmapConvergeState v1 — on-disk state.toon for roadmap convergence sessions; sign_off_state, round, passLimit, dimensions, open_questions, stall detector snapshot, and F-13 migrator contract
      source: protocols/roadmap-converge-state.schema.toon

    - name: roadmap-rubrics
      description: Per-dimension rubric files for the roadmap-converge harness — green/yellow/red exemplars for vision, milestones, tool-selection, data-model, success-metrics, constraints, risks, out-of-scope; archetype overrides in roadmap-converge.rubricOverrides
      source: protocols/roadmap-rubrics/vision.md

    - name: loom-decision-principles
      description: Decision Principles + classifier (mechanical / taste / user-challenge) consulted by auto-flow agents. Defines P1–P6 precedence, per-phase tiebreakers, and the required decision emission contract.
      source: protocols/loom-decision-principles.md

    - name: worktree-lease
      description: "Cross-worktree lease registry schema for the M-09 F-01 fan-in preflight. Defines leases[]{id,workspacePath,branch,ownedGlobs,claimedAt,expiresAt,status} written to ~/.loom/leases/{repo}.toon. Advisory only — no enforcement in M-09. Shipped by M-09 (gstack adoption Phase 10)."
      source: protocols/worktree-lease.schema.toon

    - name: version-slot
      description: "VERSION-slot registry schema at ~/.loom/version-slots.toon. Defines slots[]{repo,version,branch,worktreePath,prNumber,prState,claimedAt,lastSeenAt} written by scripts/loom-version-slot.ts and read by /loom-ship + /loom-landing-report. Stale rows are ejected when branch is gone AND no open PR. Shipped by M-10 (gstack adoption Phase 11 F-30)."
      source: protocols/version-slot.schema.toon

    - name: learnings-schema
      description: "Learnings registry schema at .loom/learnings.toon. Defines learnings[]{id,capturedAt,category,summary,context,appliesTo,confidence} consumed by plan-review agents (CEO/eng/design/devex) at preamble to inject prior lessons into review passes. Shipped by M-04 (gstack adoption Phase 4)."
      source: protocols/learnings.schema.toon

    - name: regressions-schema
      description: "Regressions registry schema at .loom/regressions.toon. Defines regressions[]{id,capturedAt,summary,rootCause,detection,preventionRule} consumed by plan-eng-review-agent to enforce anti-skip clauses citing named regressions. Shipped by M-04 (gstack adoption Phase 4)."
      source: protocols/regressions.schema.toon

  # In v4, skills = Claude Code native skills (new, initialized empty at v3→v4 migration)
  skills:
    - name: python-conventions
      description: Python ecosystem conventions — Polars-first for new code, uv/ruff/pytest, atomic writes, type hints, TOON output for Loom artifacts.
      source: skills/python-conventions/SKILL.md
      triggers:
        - "**/*.py"
        - "**/pyproject.toml"
        - "**/requirements.txt"

    - name: shell-conventions
      description: Shell-script conventions — BSD/GNU portability, locale-stable text matching, defensive parsing, never-suppress-errors. Auto-loads on .sh/.bash edits to prevent the 7 failure modes from PR #18.
      source: skills/shell-conventions/SKILL.md
      triggers:
        - "**/*.sh"
        - "**/*.bash"
        - "scripts/**"
        - "hooks/*.sh"

    - name: feedback-loop
      description: Feedback-loop construction discipline — 10-rung ladder (failing test → curl → CLI+fixture diff → headless browser → trace replay → throwaway harness → fuzz → bisection → differential → HITL bash), TRDA gate definition, and tighten-the-loop heuristics. Auto-loads during loom-converge loop construction, loom-bugfix Phase-1 gate, or any session where you are writing or evaluating a FeedbackLoop artifact.
      source: skills/feedback-loop/SKILL.md
      triggers:
        - ".plan-execution/loops/**"
        - "**/loop.toon"
        - "**/feedback-loop*"

    - name: loom-install
      description: Direct-symlink install path for Loom — alternative to plugin marketplace, cross-host (claude-code, hermes, openclaw, codex). Documents install/upgrade/uninstall flow, git-pull upgrade path, cross-host binding, and the install manifest schema. Auto-loads when working under bin/loom-install, scripts/loom-install.ts, or ~/.loom/install-manifest.toon.
      source: skills/loom-install/SKILL.md
      triggers:
        - "bin/loom-install"
        - "scripts/loom-install.ts"
        - "**/install-manifest.toon"

    - name: loom-retro
      description: Retrospective ceremony — reads git activity, closed PRs, and planning artifacts, then appends structured learnings and regressions to .loom/. 5-phase workflow — gather activity, structured interview, extract learnings with confidence scores, extract anti-patterns, suggest ROADMAP mutations.
      source: skills/loom-retro/SKILL.md

    - name: loom-think
      description: 5-phase office-hours deep-think interview for fuzzy problems — Problem, Demand Evidence, Status Quo, Approach Candidates (cross-model review marker), Target User / Narrowest Wedge, Synthesis. Writes a durable design doc to .loom/thinks/{slug}-{ISO-timestamp}.md with a Supersedes chain, feeding /loom-roadmap init --from.
      source: skills/loom-think/SKILL.md

    - name: loom-spec
      description: 5-phase interview from vague idea to precise ROADMAP feature block or GH issue — Elicit, Sharpen, Classify (bug/feature/enhancement/refactor/debt), Draft, Optional worktree spawn. Emits a SpecRecord TOON envelope; documents auto-close-on-merge for the source GH issue.
      source: skills/loom-spec/SKILL.md

    - name: loom-docs-release
      description: "Post-ship doc sync — diff-driven README/CHANGELOG/ARCH updates, diagram drift detection, and a CHANGELOG sell-test rubric (names user benefit, scannable in <3s, no marketing prose). Emits a DocSyncReport and surfaces doc-debt in the PR body; exits non-zero when README is missing an entry for a shipped surface. Shipped by M-06 (gstack adoption Phase 6)."
      source: skills/loom-docs-release/SKILL.md

    - name: loom-skillify
      description: "Retrospective codification — walks back the conversation transcript, distills a successful one-shot flow into script.ts + test.ts + TOON fixture under scripts/skillified/, and runs vitest before registering. The backward-direction pair to /loom-agent create and /loom-skill create. Shipped by M-06 (gstack adoption Phase 6)."
      source: skills/loom-skillify/SKILL.md

    - name: loom-browser
      description: "Persistent Chromium daemon at .loom/browser/ with tiered READ/WRITE/META command semantics, a11y-tree refs (role+name+index), anti-bot stealth stubs, and prompt-injection defense hook that M-05 F-15 wires to code-llm-trust-review-agent. Wraps existing user Chrome install — no binary bundled. Shipped by M-11 (gstack adoption Phase 7)."
      source: skills/loom-browser/SKILL.md

    - name: loom-setup-browser-cookies
      description: "Import real Chrome/Chromium/Brave/Edge cookies into .loom/browser/cookies/{domain}.toon for authenticated live-site QA. Detects cookie store on macOS/Linux/Windows, reads domain list from .loom/browser/cookie-domains.toon, tracks per-cookie expiry. Gitignored. Shipped by M-11 (gstack adoption Phase 7)."
      source: skills/loom-setup-browser-cookies/SKILL.md

    - name: loom-cso
      description: "Chief Security Officer plan/code audit — two-tier: daily 8/10 gate (confidence >= 8, blocks PR on regression) + monthly 2/10 deep-scan (confidence >= 2). Seven lenses: secrets, dep vulns, auth boundaries, input validation, LLM trust, file perms, CI/CD supply chain. Appends to .loom/security-history.toon. Shipped by M-07 (gstack adoption Phase 8)."
      source: skills/loom-cso/SKILL.md

    - name: loom-qa
      description: "Live-site iterative test-fix loop. Browser-drives site via /loom-browser daemon, finds bugs, fixes iteratively with atomic commits, re-verifies until stable or tier budget exhausted. Three tiers: Quick (5 min happy-path), Standard (15 min + top 5 states), Exhaustive (45 min full a11y + edge + regression). Emits before/after health scores + shipReadiness. Shipped by M-07 (gstack adoption Phase 8)."
      source: skills/loom-qa/SKILL.md

    - name: loom-devex-review
      description: "Live DX audit — measures actual TTHW (time-to-hello-world) in a fresh temp dir and reports a boomerang delta vs plan-devex-review-agent's predictedTTHW. Scores CLI help, error messages, config-surface complexity. Archives to planning/history/reviews/{date}-devex-audit.toon so the next plan review can adjust. Shipped by M-07 (gstack adoption Phase 8)."
      source: skills/loom-devex-review/SKILL.md

    - name: loom-worktree
      description: "Cross-worktree fan-in preflight — enumerates sibling worktrees at ../ and $HOME/.worktrees, extracts owned globs from PLAN.md or git diff, writes advisory leases to ~/.loom/leases/{repo}.toon per protocols/worktree-lease.schema.toon, and reports overlap findings with confidence 1-10. Advisory only — see skill body for the three-mechanism roadmap (enforced leases, semantic AST scan, rebase-storm coordinator). Shipped by M-09 (gstack adoption Phase 10 F-01)."
      source: skills/loom-worktree/SKILL.md

    - name: loom-ship
      description: "Chief ship-engineer skill — pre-flight rebase-from-base + drift detection + VERSION-slot reservation via scripts/loom-version-slot.ts + plan-completion audit (DIFF-VERIFIABLE / CROSS-REPO / EXTERNAL-STATE / CONTENT-SHAPE classifier, cap 50) inlined in PR body via gh pr create. Halts on rebase conflict, unresolved drift, or missing gh. Shipped by M-10 (gstack adoption Phase 11 F-30)."
      source: skills/loom-ship/SKILL.md

    - name: loom-canary
      description: "Progressive deploy skill — three-phase rollout (10%/50%/100%) with health-check gates between phases and immediate rollback on any gate failure. Reads deploy config from CLAUDE.md ## Deploy Configuration block populated by /loom-setup:deploy; wraps target-native CLI (fly/vercel/wrangler/netlify/railway/render). Appends every run to .loom/canary-history.toon. Shipped by M-10 (gstack adoption Phase 11 F-31)."
      source: skills/loom-canary/SKILL.md

    - name: loom-landing-report
      description: "Multi-workspace dashboard skill — enumerates sibling worktrees at ../ and $HOME/.worktrees, cross-references ~/.loom/version-slots.toon and open PRs via gh, and emits a TOON workspaces[] table with workspace/branch/versionSlot/lastCommit/prNumber/prState/stale columns. Stale = no commits in 24 h AND no matching open PR. Read-only. Shipped by M-10 (gstack adoption Phase 11 F-31)."
      source: skills/loom-landing-report/SKILL.md

    - name: loom-setup-deploy
      description: "Deploy-target detection skill — scans repo signals (fly.toml → vercel.json/.vercel/ → wrangler.toml/wrangler.jsonc → netlify.toml/.netlify/ → railway.json → render.yaml → bare Dockerfile) and appends a ## Deploy Configuration TOON block to CLAUDE.md conforming to protocols/loom-ship-config.schema.toon. Read-only w.r.t. native deploy configs per C-06. Shipped by M-10 (gstack adoption Phase 11 F-32)."
      source: skills/loom-setup-deploy/SKILL.md

    - name: loom-design-consultation
      description: "Ground-up brand kickoff — 5-phase interview (audience/tone → aesthetic direction → typography pairing → color system → motion principles) writing a durable premise artifact to .loom/design/{slug}-{ISO-timestamp}.md. Reads .loom/learnings.toon (domain: design) for prior cross-project decisions. Optional font-preview render delegated to /loom-design:html. Shipped by M-13 (gstack adoption Phase 13 F-22)."
      source: skills/loom-design-consultation/SKILL.md

    - name: loom-design-html
      description: "Production HTML/CSS from mockup — Pretext-native rules (rem/em, flexbox/grid, computed heights, text-wrap: balance/pretty, semantic HTML5, tokenized colors) plus Phase 5 F-14 anti-AI-slop guards (no gradient overuse, no marketing-prose comments, no default palettes without customization). Emits docs/design/{slug}/index.html + styles.css atomically. Shipped by M-13 (gstack adoption Phase 13 F-23)."
      source: skills/loom-design-html/SKILL.md

    - name: loom-design-shotgun
      description: "Parallel UI variant board — generates N variants (default 4) on distinct axes (minimalist/dense/brutalist/editorial), renders side-by-side via /loom-browser daemon (fallback to .loom/design/shotgun/{slug}/variant-{n}.html), captures user preference with capturedAt ISO-8601 timestamp to .loom/design/preferences.toon, time-decays old preferences (weight-down at 90 d, drop-out at 180 d) so taste memory adapts without ossifying. Shipped by M-13 (gstack adoption Phase 13 F-24)."
      source: skills/loom-design-shotgun/SKILL.md

  infrastructure:
    - name: statusline-renderer
      description: Node.js statusline renderer for Claude Code — pipeline state, context bar, update indicator
      source: hooks/statusline-renderer.cjs
      target: ~/.claude/statusline-renderer.cjs

    - name: statusline-command
      description: Shell wrapper that delegates to the Node.js statusline renderer
      source: hooks/statusline-command.sh
      target: ~/.claude/statusline-command.sh

    - name: loom-update-checker
      description: Background update check — fetches catalog version from GitHub, writes cache
      source: hooks/loom-update-checker.cjs
      target: ~/.claude/loom-update-checker.cjs

    - name: agent-result-validator
      description: PostToolUse hook that scans AgentResult TOON envelopes for findings[] rows and emits FINDING_MISSING_CONFIDENCE (non-blocking warning) when the confidence:1-10 field is absent or out of range. Contract - protocols/agent-result.schema.md § Confidence Semantics. Register via scripts/register-loom-hooks.ts.
      source: hooks/agent-result-validator.ts

    - name: loom-learnings-search
      description: CLI utility to search .loom/learnings.toon by keyword on key/description/tags, filter by --min-confidence, sort by confidence desc, and print top-N as a TOON typed array. Always exits 0.
      source: scripts/loom-learnings-search.ts

    - name: loom-careful
      description: PreToolUse hook that blocks destructive Bash commands (rm -rf against /, ~, ., *, DROP TABLE, git push --force, git reset --hard, chmod -R 777, dd to /dev/*, mkfs, redirects to /dev/sda*). Emits CAREFUL_BLOCKED. Override with env LOOM_CAREFUL_OVERRIDE=1. Fail-open on parse errors.
      source: hooks/loom-careful.ts

    - name: loom-health
      description: CLI that runs typecheck (30%), tests (30%), lint (20%), dead-code (10%), and shellcheck (10%) and prints a composite 0-10 quality score as TOON, appending a HealthScoreHistory row to .loom/health-history.toon. Missing tools emit HEALTH_TOOL_MISSING and drop from the re-normalised composite.
      source: scripts/loom-health.ts

    - name: loom-browser-daemon
      description: "Persistent Chromium daemon runtime for M-11 F-33. Subcommands start|stop|status|exec. Writes .loom/browser/state.toon per protocols/browser-state.schema.toon. Detects Chrome/Chromium/Brave/Edge binary; falls back to stub mode (queue-only, no hard fail) when no binary is present. Prompt-injection defense hook is a no-op in M-11 and is wired to code-llm-trust-review-agent in M-05 F-15."
      source: scripts/loom-browser-daemon.ts

    - name: loom-import-cookies
      description: "Chrome cookie import runtime for M-11 F-34. Detects cookie store on macOS/Linux/Windows for Chrome/Chromium/Brave/Edge, reads domain list from .loom/browser/cookie-domains.toon, decrypts cookies via chrome-cookies-secure (best-effort — prints install hint if missing), and writes per-domain files to .loom/browser/cookies/{domain}.toon with expiresAt per cookie."
      source: scripts/loom-import-cookies.ts

    - name: loom-benchmark-models
      description: "Side-by-side comparison of Claude+GPT+Gemini on same prompt with LLM judge scoring quality; dashboard reports latency, tokens, cost, and quality per vendor. Appends to .loom/benchmark-history.toon. Shipped by M-08 (gstack adoption Phase 9 F-25)."
      source: skills/loom-benchmark-models/SKILL.md

    - name: loom-learn
      description: "Review/search/prune/export learnings from .loom/learnings.toon (from M-01 F-04). Proactively surfaces top 3 prior learnings when the user prompt contains 'didn't we', 'before', 'again', 'recurring'. Shipped by M-08 (gstack adoption Phase 9 F-26)."
      source: skills/loom-learn/SKILL.md

    - name: loom-benchmark
      description: "Perf regression via /loom-browser daemon — Core Web Vitals baseline/PR-diff with LCP/CLS/FID/INP per PR; appends to .loom/perf-history.toon. Shipped by M-08 (gstack adoption Phase 9 F-27)."
      source: skills/loom-benchmark/SKILL.md

    - name: loom-docs-generate
      description: "Cold-start docs via Diataxis quadrant (tutorial/how-to/reference/explanation) — emits 4 stub docs under docs/ with diataxis: frontmatter tags. Shipped by M-08 (gstack adoption Phase 9 F-28)."
      source: skills/loom-docs-generate/SKILL.md

    - name: loom-diagram
      description: "English or mermaid → excalidraw triplet (source .md + editable .excalidraw + rendered .svg/.png). Registers each triplet in .loom/diagrams/index.toon for drift detection by /loom-docs:release. Shipped by M-08 (gstack adoption Phase 9 F-29)."
      source: skills/loom-diagram/SKILL.md

    - name: loom-worktree-scan
      description: "CLI utility that scans sibling worktrees at ../ and $HOME/.worktrees, derives file-ownership from PLAN.md or git diff --name-only base...HEAD, and writes an advisory lease registry to ~/.loom/leases/{repo}.toon per protocols/worktree-lease.schema.toon. Subcommands - scan, preflight (exit 1 on overlap), leases, release <id>. Shipped by M-09 (gstack adoption Phase 10 F-01)."
      source: scripts/loom-worktree-scan.ts

    - name: preflight-worktree-scan
      description: "PreToolUse hook that watches Bash tool calls for /loom-git pr invocations and runs the cross-worktree ownership scanner. Non-blocking - emits stderr warning findings (each with confidence:1-10 + suggestedAction) when sibling-worktree overlap is detected. Bypass with LOOM_WORKTREE_PREFLIGHT_DISABLE=1. Fail-open on all errors. Register via scripts/register-loom-hooks.ts. Shipped by M-09 (gstack adoption Phase 10 F-01)."
      source: hooks/preflight-worktree-scan.ts

    - name: loom-version-slot
      description: "VERSION-slot reservation runtime for /loom-ship. Scans sibling worktrees for claimed versions (package.json/pyproject.toml/Cargo.toml/VERSION) and layers open-PR data via gh pr list. Writes registry to ~/.loom/version-slots.toon per protocols/version-slot.schema.toon (atomic .tmp+rename). Subcommands: scan | next --bump patch|minor|major | reserve <version> | release <version>. Shipped by M-10 (gstack adoption Phase 11 F-30)."
      source: scripts/loom-version-slot.ts

    - name: loom-install
      description: "Direct-symlink install path for Loom (F-35, M-12 Distribution). Alternative to plugin marketplace; neither channel deprecates the other (roadmap C-07). bin/loom-install wraps scripts/loom-install.ts and supports --link, --unlink, --check across four hosts: claude-code (default), hermes, openclaw, codex. Writes ~/.loom/install-manifest.toon per protocols/install-manifest.schema.toon (atomic .tmp+rename). Idempotent --link, INSTALL_MANIFEST_INVALID blocking on corrupt manifest during --unlink. Shipped by M-12 (gstack adoption Phase 12)."
      source: scripts/loom-install.ts


catalog_version: 2
repo: https://github.com/launchstack-dev/loom-ai

default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: execution-protocols
      description: Inter-agent protocol schemas for the Loom execution pipeline (AgentResult, state.toon, execution conventions)
      source: agents/protocols/execution-conventions.md

    - name: toon-format-protocol
      description: TOON (Token-Oriented Object Notation) format specification for all on-disk artifacts and agent communication
      source: agents/protocols/toon-format.md

    - name: pattern-executor-protocol
      description: Reusable pattern runtime protocol for debate, chain, vote, triage orchestration patterns
      source: agents/protocols/pattern-executor.md

    - name: roadmap-schema
      description: Schema for ROADMAP.md structure - vision, features, milestones, constraints, conceptual data model
      source: agents/protocols/roadmap.schema.md

    - name: spec-schema
      description: Schema for v2 spec-level plan sections - API specs, state machines, error handling, validation rules
      source: agents/protocols/spec.schema.md

    - name: plan-schema
      description: Schema for PLAN.md structure - phases, waves, deliverables, acceptance criteria, file ownership
      source: agents/protocols/plan.schema.md

    - name: agent-result-schema
      description: Standard AgentResult return envelope schema - status, files, exports, issues, integration notes
      source: agents/protocols/agent-result.schema.md

    - name: state-schema
      description: Execution state schema for state.toon - waves, tasks, agents, file hashes, rolling context
      source: agents/protocols/state.schema.md

    - name: pipeline-state-schema
      description: Pipeline state schema for /loom-auto - outer iterations, stage history, failure log, circuit breakers
      source: agents/protocols/pipeline-state.schema.md

    - name: agent-monitoring-schema
      description: Agent progress monitoring schema - heartbeat files, stale detection, escalation thresholds
      source: agents/protocols/agent-monitoring.schema.md

    - name: validation-rules
      description: Validation rules for AgentResult, orchestration.toml, blocker gates, state integrity, plan structure
      source: agents/protocols/validation-rules.md

    - name: orchestration-patterns
      description: Orchestration pattern catalog - debate, chain, vote, triage, converge with config schemas and examples
      source: agents/protocols/orchestration-patterns.md

    - name: orchestration-config-schema
      description: Schema for .claude/orchestration.toml - project-specific agent registration, pattern config, settings
      source: agents/protocols/orchestration-config.schema.md

    - name: statusline-contract
      description: Output format contract for the Claude Code status line — defines ambient state shape, renderer protocol, and Starship integration
      source: agents/protocols/statusline-contract.md

    - name: git-command-contract
      description: Subcommand dispatch contract for loom-git — defines commit, push, PR, merge, cleanup, review-pr protocols
      source: agents/protocols/git-command-contract.md

    - name: quick-task-contract
      description: Contract for loom-quick — mode detection, plan-aware append, mid-execution injection, verification protocol
      source: agents/protocols/quick-task-contract.md

    - name: loom-quick-routing
      description: "Natural-language routing skill for /loom-quick — triggers on \"quickly fix\", \"just do\", \"quick task\" patterns"
      source: skills/loom-quick-routing.md

    # Wiki protocols
    - name: wiki-page-schema
      description: Schema for individual wiki pages — TOON frontmatter format, categories, cross-references, staleness model
      source: agents/protocols/wiki-page.schema.md

    - name: wiki-index-schema
      description: Schema for wiki index.toon — categorical catalog of all wiki pages
      source: agents/protocols/wiki-index.schema.md

    - name: wiki-log-schema
      description: Schema for wiki log.toon — append-only chronological record of wiki operations
      source: agents/protocols/wiki-log.schema.md

    - name: execution-log-schema
      description: Schema for execution-log.toon — narrative decision, pivot, and milestone history
      source: agents/protocols/execution-log.schema.md

    - name: wiki-conventions
      description: Conventions for wiki agents — directory structure, page format, cross-ref rules, staleness model, atomic writes
      source: agents/protocols/wiki-conventions.md

    - name: wiki-lint-rules
      description: Structural health check rules for wiki and execution artifacts — contradictions, orphans, drift, staleness
      source: agents/protocols/wiki-lint-rules.md

    - name: behavioral-guidelines
      description: Karpathy-inspired behavioral guardrails for agents — assumption surfacing, simplicity, surgical changes, goal-driven verification
      source: agents/protocols/behavioral-guidelines.md

    - name: scope-contract-schema
      description: Schema for scope-contract.toon — pre-flight decisions, assumptions, acceptance criteria, non-goals, contract evolution rules
      source: agents/protocols/scope-contract.schema.md

  infrastructure:
    - name: statusline-renderer
      description: Node.js statusline renderer for Claude Code — pipeline state, context bar, update indicator
      source: hooks/statusline-renderer.cjs
      target: ~/.claude/statusline-renderer.cjs

    - name: statusline-command
      description: Shell wrapper that delegates to the Node.js statusline renderer
      source: hooks/statusline-command.sh
      target: ~/.claude/statusline-command.sh

    - name: loom-update-checker
      description: Background update check — fetches catalog version from GitHub, writes cache
      source: hooks/loom-update-checker.cjs
      target: ~/.claude/loom-update-checker.cjs

  agents:
    # Planning agents
    - name: feature-coverage-agent
      description: Audits plan schema, API surface, and features against competitors
      source: agents/feature-coverage-agent.md

    - name: strategy-agent
      description: Evaluates product strategy across the full lifecycle — positioning and prioritization during planning, drift and scope creep during review
      source: agents/strategy-agent.md

    - name: ux-agent
      description: Evaluates user experience across the full lifecycle — flows and state coverage during planning, UX conformance during review
      source: agents/ux-agent.md

    - name: phasing-agent
      description: Reviews phase boundaries, dependencies, and sequencing risks
      source: agents/phasing-agent.md

    - name: parallelization-agent
      description: Designs multi-agent execution waves and merge strategy
      source: agents/parallelization-agent.md

    - name: agentic-workflow-agent
      description: Decomposes phases into context-bounded tasks for AI agents
      source: agents/agentic-workflow-agent.md

    # Execution agents
    - name: contracts-agent
      description: Wave 0 specialist - creates shared types, interfaces, schemas
      source: agents/contracts-agent.md
      requires: [skill:execution-protocols]

    - name: implementer-agent
      description: Parallel worker within file ownership boundaries
      source: agents/implementer-agent.md
      requires: [skill:execution-protocols]

    - name: wiring-agent
      description: Post-wave integration - barrel files, routes, imports, deps
      source: agents/wiring-agent.md
      requires: [skill:execution-protocols]

    - name: verification-agent
      description: Quality gate - typecheck, tests, lint, ownership drift
      source: agents/verification-agent.md
      requires: [skill:execution-protocols]

    # Testing agents
    - name: acceptance-criteria-agent
      description: Extracts testable acceptance criteria from plan phases, outputs structured test specs
      source: agents/acceptance-criteria-agent.md

    - name: unit-test-agent
      description: Generates unit tests from contracts, acceptance criteria, and source code
      source: agents/unit-test-agent.md

    - name: e2e-test-agent
      description: Generates Playwright E2E tests, supports --chrome and bowser integration
      source: agents/e2e-test-agent.md

    # Code review agents
    - name: plan-compliance-reviewer
      description: Reviews code against PLAN.md deliverables, schemas, and acceptance criteria
      source: agents/plan-compliance-reviewer.md

    - name: security-reviewer
      description: OWASP-focused security audit - injection, auth, XSS, secrets, dependencies
      source: agents/security-reviewer.md

    - name: architecture-reviewer
      description: Architecture drift detection - dependency direction, pattern consistency, contracts
      source: agents/architecture-reviewer.md

    # Roadmap agents
    - name: roadmap-builder-agent
      description: Creates ROADMAP.md files from descriptions and discussion output, supports refinement mode
      source: agents/roadmap-builder-agent.md
      requires: [skill:roadmap-schema]

    - name: scope-feasibility-agent
      description: Reviews roadmap scope, feature conflicts, milestone sizing, constraint compliance
      source: agents/scope-feasibility-agent.md
      requires: [skill:roadmap-schema]

    - name: api-explorer
      description: Brownfield API surface analyst - discovers internal endpoints, external integrations, undocumented routes
      source: agents/api-explorer.md

    # API agents (execution)
    - name: api-route-creator
      description: Specialized implementer that generates internal API endpoints (routes, validation, middleware)
      source: agents/api-route-creator.md
      requires: [skill:execution-protocols]

    - name: api-connector
      description: Specialized implementer that generates typed third-party API clients (auth, retry, timeout, response mapping)
      source: agents/api-connector.md
      requires: [skill:execution-protocols]

    # Planning agents (extended)
    - name: prompt-refiner-agent
      description: Expands loose user prompts into structured project briefs by scanning codebase, inferring scope, and flagging ambiguities
      source: agents/prompt-refiner-agent.md

    - name: questioner-agent
      description: "Scope interrogator — proposal-based decisions with code examples, acceptance criteria generation, brownfield context awareness"
      source: agents/questioner-agent.md
      requires: [skill:execution-protocols, skill:scope-contract-schema]

    - name: plan-builder-agent
      description: Creates v1/v2 PLAN.md files - v2 is spec-driven with API specs, state machines, error handling
      source: agents/plan-builder-agent.md
      requires: [skill:spec-schema]

    # Utility agents
    - name: meta-agent
      description: Generates new Claude Code agents, skills, and commands
      source: agents/meta-agent.md

    - name: tdd-coach
      description: Drives test-driven development with red-green-refactor
      source: agents/tdd-coach.md

    # Convergence agents
    - name: target-parser
      description: Normalizes deterministic sources into structured target manifests for convergence comparison
      source: agents/target-parser.md

    - name: harness-builder
      description: Scaffolds comparison infrastructure — diff scripts, converge.config, and harness runner
      source: agents/harness-builder.md

    - name: delta-analyzer
      description: Reads Delta Reports, classifies noise vs actionable gaps, produces prioritized fix lists
      source: agents/delta-analyzer.md

    - name: convergence-driver
      description: Iteration orchestrator with circuit breakers — runs the convergence loop until targets match
      source: agents/convergence-driver.md

    # Documentation agents
    - name: project-guidance-agent
      description: Creates CLAUDE.md and AI coding assistant guidance files from codebase analysis
      source: agents/project-guidance-agent.md

    - name: docs-auditor
      description: Audits documentation for staleness, gaps, contradictions, and Loom readiness
      source: agents/docs-auditor.md

    - name: docs-generator
      description: Generates README, API docs, ADRs, onboarding guides, and module documentation
      source: agents/docs-generator.md

    # Wiki agents
    - name: wiki-maintainer-agent
      description: Maintains project wiki — updates pages, cross-references, index after execution events and code changes
      source: agents/wiki-maintainer-agent.md
      requires: [skill:wiki-conventions, skill:wiki-page-schema]

    - name: wiki-ingest-agent
      description: Processes new sources into structured wiki pages with cross-references — codebase, docs, execution results, notes
      source: agents/wiki-ingest-agent.md
      requires: [skill:wiki-conventions, skill:wiki-page-schema]

    - name: wiki-lint-agent
      description: Periodic wiki health check — contradictions, orphaned pages, stale content, missing cross-refs, plan-reality drift
      source: agents/wiki-lint-agent.md
      requires: [skill:wiki-lint-rules, skill:wiki-conventions]

    - name: wiki-query-agent
      description: Searches wiki and synthesizes answers from multiple pages — follows cross-references, optionally files answers back
      source: agents/wiki-query-agent.md
      requires: [skill:wiki-conventions]

    # Extended review agents
    - name: performance-reviewer
      description: Performance audit - algorithmic complexity, N+1 queries, memory leaks, bundle size, caching
      source: agents/performance-reviewer.md

    - name: accessibility-reviewer
      description: WCAG compliance audit - semantic HTML, ARIA, keyboard nav, color contrast, screen readers
      source: agents/accessibility-reviewer.md

    - name: dependency-auditor
      description: Dependency tree audit - CVEs, license conflicts, outdated packages, supply chain risks
      source: agents/dependency-auditor.md

    - name: api-design-reviewer
      description: REST/GraphQL API design review - consistency, naming, versioning, pagination, error formats
      source: agents/api-design-reviewer.md

    - name: database-schema-reviewer
      description: Database schema audit - normalization, indexes, migrations, constraints, query patterns
      source: agents/database-schema-reviewer.md

    - name: infra-reviewer
      description: Infrastructure config review - Docker, CI/CD, env vars, secrets management, scaling
      source: agents/infra-reviewer.md

    - name: observability-reviewer
      description: Monitoring and logging audit - structured logging, metrics, tracing, alerting, dashboards
      source: agents/observability-reviewer.md

    # Architecture agents
    - name: tech-stack-debater
      description: Adversarial tech stack evaluation - framework comparisons, trade-off analysis, migration cost
      source: agents/tech-stack-debater.md

    - name: migration-architect
      description: Data migration planning - schema transforms, rollback strategies, zero-downtime migration
      source: agents/migration-architect.md

    # Code fix agents
    - name: fixer-agent
      description: Applies code review findings as targeted fixes within file ownership boundaries
      source: agents/fixer-agent.md

  prompts:
    # ── Unified noun commands (v2.1) ──────────────────────────────

    - name: loom-plan
      description: "Plan operations — create, review, execute, test plans via subcommands"
      source: commands/loom-plan.md
      requires: [agent:plan-builder-agent, agent:feature-coverage-agent, agent:strategy-agent, agent:ux-agent, agent:phasing-agent, agent:parallelization-agent, agent:agentic-workflow-agent, agent:contracts-agent, agent:implementer-agent, agent:wiring-agent, agent:verification-agent, agent:acceptance-criteria-agent, agent:unit-test-agent, agent:e2e-test-agent, skill:execution-protocols, skill:plan-schema, skill:spec-schema]

    - name: loom-code
      description: "Code quality — review with 9+ agents, auto-apply fixes via subcommands"
      source: commands/loom-code.md
      requires: [agent:security-reviewer, agent:architecture-reviewer, agent:plan-compliance-reviewer, agent:fixer-agent]

    - name: loom-wiki
      description: "Wiki management — ingest, lint, query, status via subcommands"
      source: commands/loom-wiki.md
      requires: [agent:wiki-ingest-agent, agent:wiki-maintainer-agent, agent:wiki-lint-agent, agent:wiki-query-agent, skill:wiki-conventions, skill:wiki-lint-rules]

    - name: loom-agent
      description: "Agent management — create bespoke agents, list registered agents"
      source: commands/loom-agent.md
      requires: [agent:meta-agent]

    - name: loom-roadmap
      description: "Roadmap lifecycle — init, review, approve, add, insert, remove, reorder, explore, refine, validate, status"
      source: commands/loom-roadmap.md
      requires: [agent:roadmap-builder-agent, agent:plan-builder-agent, agent:questioner-agent, agent:scope-feasibility-agent, agent:feature-coverage-agent, agent:strategy-agent, agent:ux-agent]

    - name: loom
      description: "Root command — init, auto, converge, quick, pause, resume, do, next, profile, status, debate, chain, vote, triage"
      source: commands/loom.md
      requires: [agent:project-guidance-agent, agent:api-explorer, agent:docs-auditor, agent:wiki-ingest-agent, agent:wiki-lint-agent, agent:target-parser, agent:harness-builder, agent:delta-analyzer, agent:convergence-driver]

    # ── Standalone commands (unchanged) ───────────────────────────

    - name: loom-library
      description: Pull-on-demand catalog management - install, sync, search, update agents and commands
      source: commands/loom-library.md

    - name: loom-note
      description: "Accumulate notes, backlog management, review and assimilate into roadmap/plan/wiki"
      source: commands/loom-note.md

    - name: loom-statusline-setup
      description: Setup wizard for the Claude Code status line — configures Starship integration, ambient state, and the statusline renderer
      source: commands/loom-statusline-setup.md

    - name: loom-git
      description: Git workflow automation — commit, push, PR, merge, cleanup, review-pr via subcommands
      source: commands/loom-git.md


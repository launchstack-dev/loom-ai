  prompts:
    # ── Unified noun commands (v2.1) ──────────────────────────────

    - name: loom-plan
      description: "Plan operations — create, review, execute, test, materialize plans via subcommands. create flags: --autoconverge (document-mode convergence loop after plan write), --skip-critic (skip plan-critic-agent and Step 1.7 revise pass), --max-iterations N (override autoconverge cap 1-10)"
      source: commands/loom-plan.md
      requires: [agent:plan-builder-agent, agent:plan-critic-agent, agent:feature-coverage-agent, agent:strategy-agent, agent:ux-agent, agent:phasing-agent, agent:parallelization-agent, agent:agentic-workflow-agent, agent:contracts-agent, agent:implementer-agent, agent:wiring-agent, agent:verification-agent, agent:acceptance-criteria-agent, agent:unit-test-agent, agent:e2e-test-agent, protocol:execution-protocols, protocol:plan-schema, protocol:spec-schema, protocol:scenario-schema, protocol:contract-page-extensions-schema, protocol:entity-domain-partition-schema, protocol:findings-schema, protocol:plan-critique-schema, protocol:iteration-snapshot-schema, protocol:convergence-summary-schema]

    - name: loom-converge
      description: "Convergence loop — target, criteria, or document mode. --mode document iterates a single file via harness + integrator until zero blocking findings; --target <path> compares output to a golden reference; --criteria runs TDD + agent reviews. Shared options: --max-iterations N, --dry-run, --resume, --no-auto-commit"
      source: commands/loom-converge.md
      requires: [agent:convergence-driver, agent:convergence-planner-agent, agent:target-parser, agent:harness-builder, agent:delta-analyzer, agent:fixer-agent, protocol:convergence-plan-schema]

    - name: loom-change
      description: "Change-proposal lifecycle over contract-* wiki pages — list, status, diff, init, review, approve, run, archive, reject, quick-archive subcommands"
      source: commands/loom-change.md
      requires: [protocol:change-proposal-schema, protocol:change-state-schema, protocol:contract-page-extensions-schema, protocol:scenario-schema, protocol:execution-protocols, protocol:validation-rules]

    - name: loom-code
      description: "Code quality — review with 9+ agents, auto-apply fixes via subcommands"
      source: commands/loom-code.md
      requires: [agent:security-reviewer, agent:architecture-reviewer, agent:plan-compliance-reviewer, agent:fixer-agent]

    - name: loom-bugfix
      description: "Rapid bug fixing — wiki context, impact assessment, fix archiving without full plan ceremony"
      source: commands/loom-bugfix.md
      requires: [agent:bugfix-analyst-agent, protocol:fix-archive-schema]

    - name: loom-wiki
      description: "Wiki management — ingest, lint, query, status via subcommands"
      source: commands/loom-wiki.md
      requires: [agent:wiki-ingest-agent, agent:wiki-maintainer-agent, agent:wiki-lint-agent, agent:wiki-query-agent, protocol:wiki-conventions, protocol:wiki-lint-rules]

    - name: loom-agent
      description: "Agent management — create bespoke agents, list registered agents"
      source: commands/loom-agent.md
      requires: [agent:meta-agent]

    - name: loom-roadmap
      description: "Roadmap lifecycle — init, review, approve, add, insert, remove, reorder, explore, refine, validate, status"
      source: commands/loom-roadmap.md
      requires: [agent:roadmap-builder-agent, agent:plan-builder-agent, agent:questioner-agent, agent:scope-feasibility-agent, agent:feature-coverage-agent, agent:strategy-agent, agent:ux-agent]

    - name: loom-roadmap-converge
      description: "Roadmap convergence command — runs multi-pass dimensional review loop against ROADMAP.md using per-dimension rubrics; options: --roadmap <path>, --archetype <name>, --pass-cap <N>, --force"
      source: commands/loom-roadmap/converge.md
      requires: [agent:roadmap-converge-driver, agent:roadmap-converge-reviewer, agent:roadmap-converge-integrator, agent:roadmap-archetype-detector, protocol:roadmap-readiness, protocol:roadmap-converge-state, protocol:roadmap-rubrics]

    - name: loom-roadmap-sign-off
      description: "Roadmap sign-off command — transitions sign_off_state to signed-off when all dimensions are green or user explicitly signs off; enforces sign-off purity (only sign-off.ts writes signed-off)"
      source: commands/loom-roadmap/sign-off.md
      requires: [protocol:roadmap-converge-state]

    - name: loom-roadmap-status
      description: "Roadmap convergence status command — pure read over state.toon; renders per-dimension status table, open questions, round/passLimit, and sign_off_state without modifying state"
      source: commands/loom-roadmap/status.md
      requires: [protocol:roadmap-converge-state]

    - name: loom
      description: "Root command — init, auto, converge, quick, pause, resume, do, next, profile, status, debate, chain, vote, triage"
      source: commands/loom.md
      requires: [agent:project-guidance-agent, agent:api-explorer, agent:docs-auditor, agent:wiki-ingest-agent, agent:wiki-lint-agent, agent:target-parser, agent:harness-builder, agent:delta-analyzer, agent:convergence-driver]

    # ── Standalone commands (unchanged) ───────────────────────────

    - name: loom-library
      description: Pull-on-demand catalog management - install, sync, search, update agents and commands
      source: commands/loom-library.md

    - name: loom-note
      description: "add, --review, --assimilate, --organize, --connect, --briefing, --review-tasks, --done, --defer, --backlog, --promote — capture, organize, and manage tasks"
      source: commands/loom-note.md

    - name: loom-statusline-setup
      description: Setup wizard for the Claude Code status line — configures Starship integration, ambient state, and the statusline renderer
      source: commands/loom-statusline-setup.md

    - name: loom-git
      description: Git workflow automation — commit, push, PR, merge, cleanup, review-pr via subcommands
      source: commands/loom-git.md

    - name: loom-data
      description: Data engineering command — profile, validate, lineage, test
      source: commands/loom-data.md
      kit: data-engineering

    - name: loom-careful
      description: "Toggle destructive-command guard — documents the loom-careful PreToolUse hook, its blocklist, and per-command / per-session / global override paths"
      source: commands/loom-careful.md

    - name: loom-health
      description: "Composite 0-10 quality score with trend history — runs scripts/loom-health.ts and displays current score plus trend from .loom/health-history.toon"
      source: commands/loom-health.md

    - name: loom-think
      description: "5-phase deep-think interview producing a structured design doc under .loom/thinks/ — precedes /loom-roadmap init for fuzzy problems"
      source: commands/loom-think.md

    - name: loom-spec
      description: "5-phase interview from vague idea to precise ROADMAP feature block or GH issue, with optional worktree spawn and auto-close-on-merge"
      source: commands/loom-spec.md

    - name: loom-docs
      description: "Doc lifecycle dispatcher — subcommands for post-ship doc sync (release) with future room for /loom-docs:generate under M-08"
      source: commands/loom-docs.md

    - name: loom-docs-release
      description: "Post-ship doc sync subcommand — diff-driven README/CHANGELOG/ARCH updates + diagram drift + CHANGELOG sell-test; exits non-zero on unresolved doc-debt"
      source: commands/loom-docs/release.md

    - name: loom-browser
      description: "Persistent Chromium daemon (M-11 F-33) — start/stop/status/exec subcommands with tiered READ/WRITE/META semantics, a11y-tree refs, prompt-injection defense hook. Wraps existing user Chrome install."
      source: commands/loom-browser.md

    - name: loom-setup
      description: "Setup dispatcher for one-time project-local resource priming (cookies, credentials, fixtures). First subcommand is browser-cookies (M-11 F-34)."
      source: commands/loom-setup.md

    - name: loom-setup-browser-cookies
      description: "Import real Chrome/Chromium/Brave/Edge cookies into .loom/browser/cookies/{domain}.toon for authenticated live-site QA (M-11 F-34). Gitignored."
      source: commands/loom-setup/browser-cookies.md

    - name: loom-skillify
      description: "Retrospective codification of a successful one-shot flow into scripts/skillified/{slug}.ts + test.ts + TOON fixture with a vitest gate before registration"
      source: commands/loom-skillify.md

    - name: loom-cso
      description: "Chief Security Officer two-tier security review dispatcher — subcommands: daily (fast 8/10 gate, blocks PR on regression) and monthly (exhaustive 2/10 deep scan). Seven lenses: secrets, dep vulns, auth, input validation, LLM trust, file perms, CI/CD supply chain. Trend-tracked via .loom/security-history.toon. Shipped by M-07 (gstack adoption Phase 8)."
      source: commands/loom-cso.md

    - name: loom-qa
      description: "Live-site iterative test-fix loop dispatcher — --tier quick|standard|exhaustive drives target URL through /loom-browser daemon, iterates fix→verify with atomic commits, emits before/after health scores and shipReadiness verdict. Refuses to run if daemon is stopped/crashed. Shipped by M-07 (gstack adoption Phase 8)."
      source: commands/loom-qa.md

    - name: loom-devex
      description: "DX lifecycle dispatcher — subcommands for live DX audits (review) with future room for /loom-devex:trace. Shipped by M-07 (gstack adoption Phase 8)."
      source: commands/loom-devex.md

    - name: loom-devex-review
      description: "Live TTHW boomerang subcommand — measures actual install-to-hello-world time in a fresh temp dir, scores CLI help / error messages / config surface, reports delta vs plan-devex-review-agent's predictedTTHW. Shipped by M-07 (gstack adoption Phase 8)."
      source: commands/loom-devex/review.md

    - name: loom-benchmark
      description: "Benchmark dispatcher — subcommands: models (cross-vendor LLM comparison with LLM judge) and perf (Core Web Vitals regression via /loom-browser daemon). Shipped by M-08 (gstack adoption Phase 9 F-25, F-27)."
      source: commands/loom-benchmark.md

    - name: loom-benchmark-models
      description: "Cross-vendor LLM comparison subcommand — runs the same prompt across Claude/GPT/Gemini with LLM judge scoring; dashboard reports latency, tokens, cost, and quality per vendor. Shipped by M-08 (gstack adoption Phase 9 F-25)."
      source: commands/loom-benchmark/models.md

    - name: loom-benchmark-perf
      description: "Perf regression subcommand — measures Core Web Vitals (LCP/CLS/FID/INP) on baseline vs PR head via /loom-browser daemon; verdict blocks PR on >10%% deltas. Shipped by M-08 (gstack adoption Phase 9 F-27)."
      source: commands/loom-benchmark/perf.md

    - name: loom-learn
      description: "Learnings management UI — list/search/prune/export subcommands over .loom/learnings.toon; proactively surfaces prior learnings on 'didn't we'/'before'/'again'/'recurring'. Shipped by M-08 (gstack adoption Phase 9 F-26)."
      source: commands/loom-learn.md

    - name: loom-docs-generate
      description: "Cold-start Diataxis docs subcommand — generates docs/tutorial, docs/how-to, docs/reference, docs/explanation with diataxis: frontmatter. Shipped by M-08 (gstack adoption Phase 9 F-28)."
      source: commands/loom-docs/generate.md

    - name: loom-diagram
      description: "English or mermaid → excalidraw triplet (source .md + editable .excalidraw + rendered .svg). Registers each triplet in .loom/diagrams/index.toon. Shipped by M-08 (gstack adoption Phase 9 F-29)."
      source: commands/loom-diagram.md

    - name: loom-worktree
      description: "Cross-worktree fan-in coordination dispatcher — subcommands: scan (refresh advisory lease registry + print overlaps), preflight (same, exit 1 on overlap), leases (print current lease file), release <id>. Wraps scripts/loom-worktree-scan.ts and pairs with hooks/preflight-worktree-scan.ts on /loom-git pr. Advisory only; enforced mechanisms are roadmap. Shipped by M-09 (gstack adoption Phase 10 F-01)."
      source: commands/loom-worktree.md

    - name: loom-ship
      description: "One-shot pre-PR pipeline — rebase onto base, reserve next free VERSION slot, drift detection, plan-completion audit (DIFF-VERIFIABLE / CROSS-REPO / EXTERNAL-STATE / CONTENT-SHAPE classifier, cap 50), assemble PR body with ledger + test plan + optional doc-debt from /loom-docs:release, gh pr create. Halts on rebase conflict, unresolved drift, or missing gh. Shipped by M-10 (gstack adoption Phase 11 F-30)."
      source: commands/loom-ship.md

    - name: loom-canary
      description: "Progressive deploy — three phases (10%/50%/100%) gated by health-check probe with immediate rollback on any gate failure. Reads ## Deploy Configuration block from CLAUDE.md; refuses to run without config or healthCheckUrl. Appends every run to .loom/canary-history.toon. Shipped by M-10 (gstack adoption Phase 11 F-31)."
      source: commands/loom-canary.md

    - name: loom-landing-report
      description: "Cross-workspace dashboard — enumerates sibling worktrees, cross-references ~/.loom/version-slots.toon and open PRs, emits TOON workspaces[]{workspace,branch,versionSlot,lastCommit,prNumber,prState,stale} table. Read-only. Stale = no commits in 24 h AND no matching open PR. Shipped by M-10 (gstack adoption Phase 11 F-31)."
      source: commands/loom-landing-report.md

    - name: loom-setup-deploy
      description: "Deploy-target detection subcommand — scans fly.toml → vercel.json/.vercel/ → wrangler.toml/wrangler.jsonc → netlify.toml/.netlify/ → railway.json → render.yaml → bare Dockerfile and appends the ## Deploy Configuration block to CLAUDE.md (LoomShipConfig from protocols/loom-ship-config.schema.toon). Read-only w.r.t. native deploy configs per C-06. Shipped by M-10 (gstack adoption Phase 11 F-32)."
      source: commands/loom-setup/deploy.md

    - name: loom-install
      description: "Direct-symlink install path for Loom — alternative to the plugin marketplace. Actions: --link (idempotent), --unlink, --check. Cross-host: claude-code (default), hermes, openclaw, codex. Writes ~/.loom/install-manifest.toon per protocols/install-manifest.schema.toon (atomic .tmp+rename). Shipped by M-12 (gstack adoption Phase 12 F-35)."
      source: commands/loom-install.md
      requires: [skill:loom-install, infrastructure:loom-install]

    - name: loom-design
      description: "Design dispatcher — subcommands: consultation (5-phase brand kickoff → .loom/design premise), html (Pretext-native HTML/CSS from mockup with anti-AI-slop guards → docs/design/{slug}/), shotgun (N parallel UI variants on distinct axes, side-by-side render via /loom-browser with file-fallback, time-decaying preference memory at .loom/design/preferences.toon). Shipped by M-13 (gstack adoption Phase 13 F-22, F-23, F-24)."
      source: commands/loom-design.md
      requires: [skill:loom-design-consultation, skill:loom-design-html, skill:loom-design-shotgun]

    - name: loom-design-consultation
      description: "Ground-up brand kickoff subcommand — runs the 5-phase interview and writes a premise artifact to .loom/design/{slug}-{ISO-timestamp}.md. Reads .loom/learnings.toon (domain: design) for cross-project prior decisions. Shipped by M-13 (gstack adoption Phase 13 F-22)."
      source: commands/loom-design/consultation.md

    - name: loom-design-html
      description: "Mockup-to-HTML subcommand — accepts prose description or image path, emits docs/design/{slug}/index.html + styles.css with Pretext-native rules and Phase 5 F-14 anti-slop guards, validates structural parse. Shipped by M-13 (gstack adoption Phase 13 F-23)."
      source: commands/loom-design/html.md

    - name: loom-design-shotgun
      description: "Parallel UI variant board subcommand — N variants on distinct axes, side-by-side render via /loom-browser (file fallback), preference capture with capturedAt to .loom/design/preferences.toon, 90 d/180 d time decay. Shipped by M-13 (gstack adoption Phase 13 F-24)."
      source: commands/loom-design/shotgun.md

kits:
  # Kit entries are installed via /loom-library use <kit-name>
  # Each kit bundles related agents, commands, and protocols
  # See protocols/kit.schema.md for the full kit entry format

  - name: data-engineering
    description: Data pipeline quality gates, schema review, lineage tracking, and test generation
    version: 1.0.0
    minLoomVersion: 3
    includes:
      - data-schema-reviewer
      - data-test-generator
      - data-pipeline-agent
      - data-lineage-tracker
      - data-quality-gate
      - loom-data
    command: loom-data.md

  - name: python-conventions
    description: Python ecosystem conventions skill — registers triggers and conventions for new Python code in this project.
    version: 0.1.0
    minLoomVersion: 4
    includes:
      - type: skill
        name: python-conventions

  - name: shell-conventions
    description: Shell-script conventions skill — auto-loads on .sh/.bash edits to enforce portability, locale-stable text matching, defensive parsing, and never-suppress-errors rules derived from PR #18 lessons.
    version: 0.1.0
    minLoomVersion: 4
    includes:
      - type: skill
        name: shell-conventions

  - name: feedback-loop
    description: Feedback-loop construction skill — 10-rung ladder, TRDA gate, tighten-the-loop heuristics. Auto-loads in any session involving FeedbackLoop artifacts or loom-converge loop construction.
    version: 0.1.0
    minLoomVersion: 4
    includes:
      - type: skill
        name: feedback-loop

  - name: code-review
    description: "Extended code-review lenses that fan out inside /loom-code review — designer-eye visual QA with AI-slop detection, LLM trust-boundary review, and cross-vendor (OpenAI/Gemini) adversarial review. Shipped by M-05 (gstack adoption Phase 5)."
    version: 0.1.0
    minLoomVersion: 4
    includes:
      - type: agent
        name: code-design-review-agent
      - type: agent
        name: code-llm-trust-review-agent
      - type: agent
        name: code-codex-review-agent

  - name: design-build
    description: "Build-time design kit — ground-up brand consultation, Pretext-native HTML/CSS from mockup with anti-AI-slop guards, and parallel UI variant board with time-decaying taste memory. Shipped by M-13 (gstack adoption Phase 13 F-22/F-23/F-24)."
    version: 0.1.0
    minLoomVersion: 4
    includes:
      - type: skill
        name: loom-design-consultation
      - type: skill
        name: loom-design-html
      - type: skill
        name: loom-design-shotgun
      - type: prompt
        name: loom-design
      - type: prompt
        name: loom-design-consultation
      - type: prompt
        name: loom-design-html
      - type: prompt
        name: loom-design-shotgun
    command: loom-design.md

